<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .text { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .bg { fill: #f8fafc; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="520" />
  <text class="title" x="40" y="44">Bilingual GDPR RAG Architecture</text>

  <rect class="box" x="40" y="110" width="170" height="90" />
  <text class="text" x="72" y="146">Documents</text>
  <text class="sub" x="77" y="170">TXT / PDF</text>

  <rect class="box" x="250" y="110" width="190" height="90" />
  <text class="text" x="282" y="146">Chunking</text>
  <text class="sub" x="270" y="170">+ metadata tagging</text>

  <rect class="box" x="490" y="55" width="190" height="90" />
  <text class="text" x="531" y="91">ChromaDB</text>
  <text class="sub" x="530" y="115">vector index</text>

  <rect class="box" x="490" y="170" width="190" height="90" />
  <text class="text" x="543" y="206">BM25</text>
  <text class="sub" x="518" y="230">keyword retriever</text>

  <rect class="box" x="740" y="110" width="200" height="90" />
  <text class="text" x="762" y="146">Hybrid Retrieval</text>
  <text class="sub" x="767" y="170">BM25 + Vector</text>

  <rect class="box" x="980" y="110" width="180" height="90" />
  <text class="text" x="1005" y="146">Reranker</text>
  <text class="sub" x="1001" y="170">cross-encoder</text>

  <rect class="box" x="1200" y="110" width="140" height="90" />
  <text class="text" x="1245" y="146">LLM</text>
  <text class="sub" x="1218" y="170">gpt-3.5-turbo</text>

  <rect class="box" x="1080" y="300" width="210" height="90" />
  <text class="text" x="1122" y="336">Answer</text>
  <text class="sub" x="1098" y="360">with citations</text>

  <path class="arrow" d="M210 155 L250 155" />
  <path class="arrow" d="M440 155 L490 100" />
  <path class="arrow" d="M440 155 L490 215" />
  <path class="arrow" d="M680 100 L740 140" />
  <path class="arrow" d="M680 215 L740 170" />
  <path class="arrow" d="M940 155 L980 155" />
  <path class="arrow" d="M1160 155 L1200 155" />
  <path class="arrow" d="M1270 200 L1185 300" />
</svg>
